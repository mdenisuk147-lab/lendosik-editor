<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Редактор лендинга</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0d0d0d;
    font-family: 'Outfit', sans-serif;
    color: #f0f0f0;
    /* Разрешаем нативный скролл по вертикали */
    overflow-y: auto;
    overflow-x: hidden;
    touch-action: pan-y;
  }

  /* ── Шапка ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #111;
    border-bottom: 1px solid rgba(255,140,0,0.3);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 0.5px;
  }
  .header-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }
  .save-btn {
    background: linear-gradient(135deg, #ff8c00, #ffd700);
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(255,140,0,0.35);
    white-space: nowrap;
  }
  .save-btn:active { transform: scale(0.95); }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Пустое состояние ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: rgba(255,255,255,0.3);
    font-size: 15px;
    text-align: center;
    padding: 20px;
  }
  .empty-state .icon { font-size: 48px; }

  /* ── Список блоков ── */
  .block-list {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 200px;
  }

  /* ── Карточка блока ── */
  .block-item {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border: 1px solid rgba(255,140,0,0.2);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }
  .block-item.dragging {
    box-shadow: 0 12px 40px rgba(255,140,0,0.5);
    border-color: #ffd700;
    opacity: 0.95;
    z-index: 999;
    transform: scale(1.02);
  }
  .block-item.drag-over {
    border-color: #ff8c00;
    background: #211500;
  }

  /* ── Ручка (handle) — ТОЛЬКО за неё можно тянуть ── */
  .drag-handle {
    flex-shrink: 0;
    width: 48px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,140,0,0.08);
    border-right: 1px solid rgba(255,140,0,0.15);
    cursor: grab;
    /* Блокируем скролл ТОЛЬКО на handle */
    touch-action: none;
    flex-direction: column;
    gap: 5px;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle .lines {
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
  }
  .drag-handle .lines span {
    display: block;
    width: 20px;
    height: 2px;
    background: rgba(255,140,0,0.6);
    border-radius: 2px;
    transition: background 0.2s;
  }
  .block-item.dragging .drag-handle .lines span { background: #ffd700; }

  /* ── Тело карточки ── */
  .block-body {
    flex: 1;
    padding: 14px 16px;
    /* Разрешаем скролл страницы при касании тела карточки */
    touch-action: pan-y;
  }
  .block-label {
    font-size: 16px;
    font-weight: 600;
    color: #f0f0f0;
  }
  .block-index {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 3px;
  }

  /* ── Номер позиции ── */
  .block-num {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    margin-right: 14px;
    background: rgba(255,140,0,0.15);
    border: 1px solid rgba(255,140,0,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #ff8c00;
  }

  /* ── Инфо-подсказка снизу ── */
  .footer-hint {
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    padding: 20px 16px 40px;
    line-height: 1.6;
  }
  .footer-hint strong {
    color: rgba(255,140,0,0.6);
  }

  /* ── Toast уведомление ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222;
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    border: 1px solid rgba(255,140,0,0.4);
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚡ Редактор блоков</div>
    <div class="header-hint">Тяни за ≡ сбоку чтобы переместить</div>
  </div>
  <button class="save-btn" id="saveBtn" onclick="saveOrder()">Сохранить</button>
</div>

<div class="block-list" id="blockList"></div>
<div class="empty-state" id="emptyState" style="display:none">
  <div class="icon">📭</div>
  <div>Блоки не найдены.<br>Сначала создайте лендинг в боте.</div>
</div>
<div class="footer-hint">
  Перетащи блоки в нужном порядке<br>
  <strong>держась за полоску ≡ слева</strong><br>
  Остальная область — скролл страницы
</div>

<div class="toast" id="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  // ── Telegram WebApp ──────────────────────────────────────────────────────────
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // ── Парсим блоки из URL ──────────────────────────────────────────────────────
  let blocks = [];
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('blocks');
    if (raw) blocks = JSON.parse(decodeURIComponent(raw));
  } catch(e) { console.warn('blocks parse error', e); }

  // ── Рендер ──────────────────────────────────────────────────────────────────
  const list = document.getElementById('blockList');
  const empty = document.getElementById('emptyState');

  function render() {
    list.innerHTML = '';
    if (!blocks.length) {
      empty.style.display = 'flex';
      list.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    list.style.display = 'flex';

    blocks.forEach((b, i) => {
      const item = document.createElement('div');
      item.className = 'block-item';
      item.dataset.id = b.id;
      item.dataset.idx = i;
      item.innerHTML = `
        <div class="drag-handle" data-handle="true">
          <div class="lines">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="block-body" touch-action="pan-y">
          <div class="block-label">${b.label}</div>
          <div class="block-index">Блок ${i + 1} из ${blocks.length}</div>
        </div>
        <div class="block-num">${i + 1}</div>
      `;
      list.appendChild(item);
    });

    initDrag();
  }

  // ── Drag-and-Drop (только через handle) ─────────────────────────────────────
  let dragEl = null;
  let dragStartY = 0;
  let dragStartPageY = 0;
  let dragOriginalIdx = -1;
  let placeholder = null;
  let moves = 0;

  function initDrag() {
    const items = list.querySelectorAll('.block-item');

    items.forEach(item => {
      const handle = item.querySelector('.drag-handle');

      // ── TOUCH ──
      handle.addEventListener('touchstart', onTouchStart, { passive: false });

      // ── MOUSE (десктоп) ──
      handle.addEventListener('mousedown', onMouseDown);
    });
  }

  // ─── Touch ───
  function onTouchStart(e) {
    const handle = e.currentTarget;
    const item = handle.closest('.block-item');
    e.preventDefault(); // Блокируем скролл ТОЛЬКО когда тянем за handle
    startDrag(item, e.touches[0].clientY, e.touches[0].pageY);

    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }

  function onTouchMove(e) {
    if (!dragEl) return;
    e.preventDefault();
    moveDrag(e.touches[0].clientY, e.touches[0].pageY);
  }

  function onTouchEnd(e) {
    endDrag();
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
  }

  // ─── Mouse ───
  function onMouseDown(e) {
    const handle = e.currentTarget;
    const item = handle.closest('.block-item');
    e.preventDefault();
    startDrag(item, e.clientY, e.pageY);

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  function onMouseMove(e) {
    if (!dragEl) return;
    moveDrag(e.clientY, e.pageY);
  }

  function onMouseUp(e) {
    endDrag();
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }

  // ─── Основная логика ───
  function startDrag(item, clientY, pageY) {
    dragEl = item;
    dragStartY = clientY;
    dragStartPageY = pageY;
    dragOriginalIdx = parseInt(item.dataset.idx);
    item.classList.add('dragging');

    // Создаём placeholder
    placeholder = document.createElement('div');
    placeholder.style.cssText = `height: ${item.offsetHeight}px; background: rgba(255,140,0,0.08); border: 2px dashed rgba(255,140,0,0.3); border-radius: 14px; transition: height 0.2s;`;
    item.parentNode.insertBefore(placeholder, item.nextSibling);

    // Фиксируем элемент поверх
    const rect = item.getBoundingClientRect();
    item.style.cssText = `
      position: fixed;
      top: ${rect.top}px;
      left: ${rect.left}px;
      width: ${rect.width}px;
      z-index: 999;
      pointer-events: none;
      transition: none;
    `;

    try { tg?.HapticFeedback?.impactOccurred('medium'); } catch(e) {}
  }

  function moveDrag(clientY, pageY) {
    if (!dragEl) return;
    const dy = clientY - dragStartY;
    const rect = dragEl.getBoundingClientRect();

    // Двигаем перетаскиваемый элемент
    dragEl.style.top = (parseFloat(dragEl.style.top) + (clientY - dragStartY)) + 'px';
    dragStartY = clientY;

    // Находим элемент под курсором
    dragEl.style.pointerEvents = 'none';
    const elBelow = document.elementFromPoint(rect.left + rect.width / 2, clientY);
    dragEl.style.pointerEvents = 'none';

    const itemBelow = elBelow?.closest('.block-item');

    // Убираем drag-over со всех
    list.querySelectorAll('.block-item').forEach(el => el.classList.remove('drag-over'));

    if (itemBelow && itemBelow !== dragEl) {
      itemBelow.classList.add('drag-over');

      // Перемещаем placeholder
      const belowRect = itemBelow.getBoundingClientRect();
      const isAbove = clientY < belowRect.top + belowRect.height / 2;
      if (isAbove) {
        list.insertBefore(placeholder, itemBelow);
      } else {
        list.insertBefore(placeholder, itemBelow.nextSibling);
      }
    }
  }

  function endDrag() {
    if (!dragEl) return;

    // Вставляем элемент на место placeholder
    list.insertBefore(dragEl, placeholder);
    placeholder.remove();

    // Сбрасываем стили
    dragEl.style.cssText = '';
    dragEl.classList.remove('dragging');
    list.querySelectorAll('.block-item').forEach(el => el.classList.remove('drag-over'));

    // Пересобираем порядок blocks
    const newOrder = [];
    list.querySelectorAll('.block-item').forEach(el => {
      const id = el.dataset.id;
      const found = blocks.find(b => b.id === id);
      if (found) newOrder.push(found);
    });

    const changed = newOrder.some((b, i) => b.id !== blocks[i]?.id);
    if (changed) {
      moves++;
      blocks = newOrder;
      // Обновляем номера без полного ре-рендера
      list.querySelectorAll('.block-item').forEach((el, i) => {
        el.dataset.idx = i;
        el.querySelector('.block-index').textContent = `Блок ${i + 1} из ${blocks.length}`;
        el.querySelector('.block-num').textContent = i + 1;
      });
      try { tg?.HapticFeedback?.impactOccurred('light'); } catch(e) {}
    }

    dragEl = null;
    placeholder = null;
  }

  // ── Сохранение ───────────────────────────────────────────────────────────────
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function saveOrder() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Сохраняем...';

    const order = blocks.map(b => b.id);
    const payload = JSON.stringify({ order, moves });

    try {
      if (tg?.sendData) {
        tg.sendData(payload);
        showToast('✅ Порядок сохранён!');
      } else {
        // Dev mode
        console.log('Dev saveOrder:', payload);
        showToast('✅ Dev: сохранено в консоль');
      }
    } catch(e) {
      console.error(e);
      showToast('❌ Ошибка при отправке');
    }

    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Сохранить';
    }, 2000);
  }

  // ── Инициализация ────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
