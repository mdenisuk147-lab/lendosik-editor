<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shining Crown Slot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Outfit:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 0;
            background: #0a0a0a;
            color: #f0e6d8;
            font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow + Crown BG */
        .ambient-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, transparent 60%);
            z-index: 0; pointer-events: none;
        }
        .crown-svg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; opacity: 0.1; filter: blur(20px);
            z-index: 0; pointer-events: none;
            animation: pulse-crown 4s ease-in-out infinite alternate;
        }
        @keyframes pulse-crown {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.08; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.15; }
        }

        /* Machine Container */
        .slot-container {
            z-index: 2;
            width: 90%; max-width: 350px;
            background: linear-gradient(180deg, #1f140d 0%, #0d0905 100%);
            border: 2px solid rgba(255, 140, 0, 0.4);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.2), inset 0 0 20px #000;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .title {
            font-family: 'Dela Gothic One', cursive;
            font-size: 26px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 1px;
        }

        .slot-grid {
            display: flex; gap: 10px;
            background: #000;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: inset 0 0 15px rgba(255, 140, 0, 0.1);
        }

        .reel {
            width: 80px; height: 120px;
            background: linear-gradient(180deg, #111, #222 50%, #111);
            border: 1px solid #ff8c00;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .strip {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column;
        }

        .symbol {
            height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 60px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
        }

        /* Button */
        .spin-btn {
            margin-top: 30px;
            width: 100%; height: 60px;
            background: linear-gradient(180deg, #ffb347 0%, #ff8c00 100%);
            border: none; border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 24px; font-weight: 900; color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4), inset 0 2px 0 rgba(255,255,255,0.4);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }
        .spin-btn:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255, 140, 0, 0.4); }

        /* Effects */
        .big-win {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        .big-win.active { opacity: 1; pointer-events: all; }
        
        .bw-text {
            font-family: 'Dela Gothic One', cursive; font-size: 50px;
            color: #ffd700; text-shadow: 0 0 40px #ff8c00;
            transform: scale(0.1); transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; line-height: 1.1;
        }
        .big-win.active .bw-text { transform: scale(1); animation: pulse-text 0.5s infinite alternate; }
        @keyframes pulse-text { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        .bw-amount {
            font-size: 60px; font-weight: 900; color: #fff; margin-top: 15px;
            text-shadow: 0 5px 15px rgba(255, 140, 0, 0.8);
        }

        .claim-btn {
            margin-top: 40px; background: #00d900; color: white; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: 900; border-radius: 12px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,217,0,0.4);
        }
        
        .coin { position: absolute; z-index: 1001; font-size: 35px; pointer-events: none; transition: top 1.5s cubic-bezier(.5,0,1,1); }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px) rotate(-1deg); } 30% { transform: translate(5px, 5px) rotate(1deg); }
            50% { transform: translate(-5px, 5px) rotate(-1deg); } 70% { transform: translate(5px, -5px) rotate(1deg); }
        }
        .shaking { animation: shake 0.4s 3; }
        @keyframes strobe { 0%, 100% { background: #0a0a0a; } 50% { background: rgba(255,140,0,0.4); } }
        .flashing { animation: strobe 0.1s 10; }
    </style>
</head>
<body>

<div class="ambient-glow"></div>
<svg class="crown-svg" viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M20 120 L20 60 L55 90 L100 30 L145 90 L180 60 L180 120 Z" stroke="#ff8c00" stroke-width="4" fill="none"/>
  <path d="M20 120 L180 120" stroke="#ff8c00" stroke-width="5" stroke-linecap="round"/>
</svg>

<div class="slot-container">
    <div class="title">СЛОТЫ<br><span style="font-size: 16px; color: #ff8c00;">ARBITRAGE EDITION</span></div>
    
    <div class="slot-grid">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>
    
    <button class="spin-btn" onclick="spin()">ИГРАТЬ 🎰</button>
</div>

<div class="big-win" id="bigWin">
    <div class="bw-text">MEGA WIN!</div>
    <div class="bw-amount" id="winAmount">$0</div>
    <button class="claim-btn" onclick="tg.close();">ЗАБРАТЬ ДЕНЬГИ</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    try { tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); } catch(e){}

    const pool = ['🍒','🍋','🍊','🍇','🍉','🔔','👑','7️⃣'];
    const HEIGHT = 120;
    let spinning = false;

    function createStrip(target, isInit=false) {
        let h = ''; const n = isInit ? 3 : 40;
        for(let i=0; i<n; i++) h += `<div class="symbol">${pool[Math.floor(Math.random()*pool.length)]}</div>`;
        if(!isInit) {
            h += `<div class="symbol">${pool[Math.floor(Math.random()*pool.length)]}</div>`;
            h += `<div class="symbol">${target}</div>`;
            h += `<div class="symbol">${pool[Math.floor(Math.random()*pool.length)]}</div>`;
        }
        return h;
    }

    document.getElementById('r1').innerHTML = createStrip('', true);
    document.getElementById('r2').innerHTML = createStrip('', true);
    document.getElementById('r3').innerHTML = createStrip('', true);

    function spin() {
        if(spinning) return; spinning = true;
        try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){}

        const tPool = ['7️⃣','👑','🍉'];
        const target = tPool[Math.floor(Math.random()*tPool.length)];
        
        const r1 = document.getElementById('r1'); const r2 = document.getElementById('r2'); const r3 = document.getElementById('r3');
        r1.innerHTML = createStrip(target); r2.innerHTML = createStrip(target); r3.innerHTML = createStrip(target);

        function animateReel(reel, dir, isLast) {
            const y = -(reel.scrollHeight - 3 * HEIGHT);
            // CSS Fallback для телефонов
            reel.style.transition = 'none';
            reel.style.transform = 'translateY(0px)';
            void reel.offsetWidth; // reflow
            
            // "Anticipation" для 3 барабана
            const ease = isLast ? 'cubic-bezier(0.1, 0.9, 0.1, 1)' : 'cubic-bezier(0.2, 0.8, 0.2, 1)';
            reel.style.transition = `transform ${dir}ms ${ease}`;
            reel.style.transform = `translateY(${y}px)`;
        }

        animateReel(r1, 1500, false);
        animateReel(r2, 2300, false);
        animateReel(r3, 4000, true);

        setTimeout(() => document.body.classList.add('shaking'), 3600);
        setTimeout(() => { document.body.classList.remove('shaking'); showWin(); }, 4100);
    }

    function showWin() {
        try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){}
        const bw = document.getElementById('bigWin');
        const wa = document.getElementById('winAmount');
        bw.classList.add('active'); bw.classList.add('flashing');
        document.body.classList.add('shaking'); setTimeout(() => document.body.classList.remove('shaking'), 1200);

        let v=0; const tgt = Math.floor(Math.random()*85000)+15000; const step = Math.ceil(tgt/60);
        const int = setInterval(()=>{
            v += step; if(v>=tgt){ v=tgt; clearInterval(int); }
            wa.innerText = '$' + v.toLocaleString();
        }, 20);

        for(let i=0; i<100; i++) {
            setTimeout(()=>{
                const c = document.createElement('div'); c.className='coin'; c.innerText='💰';
                c.style.left = (Math.random()*120-10)+'%'; c.style.top = '-100px';
                bw.appendChild(c);
                setTimeout(()=> c.style.top = window.innerHeight+100+'px', 50);
                setTimeout(()=> c.remove(), 2000);
            }, Math.random()*2500);
        }
    }
</script>
</body>
</html>
