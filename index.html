<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LENDOSIK // BLOCK EDITOR</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --neon-green: #39ff14;
  --neon-cyan: #00fff7;
  --neon-magenta: #ff00ff;
  --term-gray: #1a1a2e;
  --term-dark: #0a0a14;
  --term-border: #2a2a4a;
  --grid-line: rgba(57,255,20,0.04);
  --scanline: rgba(57,255,20,0.02);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--term-dark); }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--term-dark);
  min-height: 100vh;
  color: #c0c0c0;
  overflow-x: hidden;
  position: relative;
}

/* ── SCANLINES ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    var(--scanline) 2px, var(--scanline) 4px
  );
  pointer-events:none; z-index:9998;
  animation: scanDrift 8s linear infinite;
}
@keyframes scanDrift { 0% { transform:translateY(0); } 100% { transform:translateY(4px); } }

/* ── GRID BG ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background:
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0 / 40px 40px,
    linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 40px 40px;
  pointer-events:none; z-index:0;
}

/* ── CORNER GLOW ── */
.glow-tl, .glow-br {
  position:fixed; width:300px; height:300px; border-radius:50%;
  filter:blur(100px); opacity:0.15; pointer-events:none; z-index:0;
}
.glow-tl { top:-100px; left:-100px; background:var(--neon-green); }
.glow-br { bottom:-100px; right:-100px; background:var(--neon-cyan); }

.wrapper {
  max-width:460px; margin:0 auto; padding:20px 14px 130px;
  position:relative; z-index:1;
}

/* ── HEADER ── */
.header { margin-bottom:22px; position:relative; }
.header-tag {
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem; font-weight:500; letter-spacing:3px; text-transform:uppercase;
  color:var(--neon-green); opacity:0.6;
  border:1px solid rgba(57,255,20,0.2);
  padding:4px 10px; border-radius:2px;
  margin-bottom:10px;
}
.header h1 {
  font-family:'Syne',sans-serif;
  font-size:1.7rem; font-weight:800;
  color:#fff; letter-spacing:-0.5px;
  line-height:1.1; margin-bottom:6px;
}
.header h1 .accent { color:var(--neon-green); }
.header-sub {
  font-size:0.7rem; color:rgba(255,255,255,0.25);
  letter-spacing:0.5px;
}
.header-sub .blink { animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

/* ── TERMINAL LINE ── */
.term-line {
  display:flex; align-items:center; gap:6px;
  padding:8px 12px; margin-bottom:16px;
  background:rgba(57,255,20,0.03);
  border:1px solid rgba(57,255,20,0.1);
  border-left:3px solid var(--neon-green);
  font-size:0.68rem; color:rgba(57,255,20,0.7);
}
.term-prompt { color:var(--neon-green); font-weight:700; }

/* ── STATS BAR ── */
.stats-bar {
  display:flex; gap:12px; margin-bottom:16px;
  font-size:0.65rem; letter-spacing:0.5px;
}
.stat {
  padding:6px 10px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--term-border);
  color:rgba(255,255,255,0.35);
  flex:1; text-align:center;
}
.stat .val { color:var(--neon-cyan); font-weight:700; font-size:0.85rem; display:block; margin-top:2px; }

/* ── BLOCK CARDS ── */
.blocks-list { display:flex; flex-direction:column; gap:6px; }

.block-card {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  background: rgba(255,255,255,0.02);
  border:1px solid var(--term-border);
  cursor:grab; touch-action:none;
  transition: all 0.12s ease;
  user-select:none;
  position:relative;
  overflow:hidden;
}
.block-card::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--neon-green); opacity:0;
  transition:opacity 0.15s;
}
.block-card:hover::before { opacity:1; }
.block-card:hover {
  background:rgba(57,255,20,0.03);
  border-color:rgba(57,255,20,0.2);
}

/* DRAGGING */
.sortable-ghost {
  opacity:0.2 !important;
  border-color:var(--neon-green) !important;
  background:rgba(57,255,20,0.05) !important;
}
.sortable-drag {
  opacity:1 !important;
  background:rgba(10,10,20,0.98) !important;
  border-color:var(--neon-green) !important;
  box-shadow:
    0 0 30px rgba(57,255,20,0.15),
    0 20px 40px rgba(0,0,0,0.6),
    inset 0 0 60px rgba(57,255,20,0.03) !important;
  transform:scale(1.02) !important;
  z-index:9999 !important;
}
.sortable-drag::before { opacity:1 !important; }

/* ── INDEX ── */
.block-idx {
  width:26px; height:26px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; font-weight:700;
  color:var(--neon-green);
  border:1px solid rgba(57,255,20,0.3);
  background:rgba(57,255,20,0.05);
  transition: all 0.2s;
}

/* ── ICON ── */
.block-icon {
  width:36px; height:36px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.15rem;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--term-border);
}

/* ── TEXT ── */
.block-info { flex:1; min-width:0; }
.block-name {
  font-family:'Space Grotesk',sans-serif;
  font-size:0.8rem; font-weight:700; color:#e0e0e0;
  margin-bottom:1px;
}
.block-desc { font-size:0.62rem; color:rgba(255,255,255,0.2); letter-spacing:0.3px; }

/* ── HANDLE ── */
.drag-handle {
  flex-shrink:0; color:rgba(57,255,20,0.2);
  font-size:0.85rem; cursor:grab; transition: color 0.15s;
  letter-spacing:2px;
}
.block-card:hover .drag-handle { color:rgba(57,255,20,0.6); }

/* ── DONE OVERLAY ── */
.done-overlay {
  position:fixed; inset:0;
  background:rgba(10,10,20,0.95);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:99999;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.done-icon {
  font-size:3rem; margin-bottom:16px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
.done-text {
  font-family:'Syne',sans-serif;
  font-size:1.3rem; font-weight:800; color:var(--neon-green);
  letter-spacing:1px; text-transform:uppercase;
  text-shadow:0 0 20px rgba(57,255,20,0.4);
  margin-bottom:6px;
}
.done-sub { font-size:0.72rem; color:rgba(255,255,255,0.3); letter-spacing:0.5px; }

/* ── Responsive ── */
@media (max-width:380px) {
  .header h1 { font-size:1.4rem; }
  .block-card { padding:10px 10px; gap:8px; }
  .block-icon { width:30px; height:30px; font-size:1rem; }
}
</style>
</head>
<body>
<div class="glow-tl"></div>
<div class="glow-br"></div>
<div class="wrapper">
  <div class="header">
    <div class="header-tag">// system.editor</div>
    <h1>Block<span class="accent">.</span>Editor</h1>
    <div class="header-sub">drag blocks to reorder <span class="blink">▮</span></div>
  </div>

  <div class="term-line">
    <span class="term-prompt">$</span>
    <span>blocks.load() → перетащи карточки в нужный порядок</span>
  </div>

  <div class="stats-bar">
    <div class="stat">BLOCKS<span class="val" id="blockCount">—</span></div>
    <div class="stat">MOVES<span class="val" id="moveCount">0</span></div>
    <div class="stat">STATUS<span class="val" id="statusVal">READY</span></div>
  </div>

  <div class="blocks-list" id="sortable"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setHeaderColor('#0a0a14');
tg.setBackgroundColor('#0a0a14');

tg.MainButton.setText('› APPLY ORDER');
tg.MainButton.color = '#39ff14';
tg.MainButton.textColor = '#0a0a14';

const BLOCK_CFG = {
  hero:     { emoji:'⚡', desc:'header + call-to-action' },
  proof:    { emoji:'◈',  desc:'social proof metrics' },
  benefits: { emoji:'✦',  desc:'feature highlights' },
  howto:    { emoji:'⟁',  desc:'step-by-step flow' },
  quiz:     { emoji:'◇',  desc:'interactive quiz module' },
  form:     { emoji:'▣',  desc:'lead capture form' },
  footer:   { emoji:'▬',  desc:'footer + links' },
};

let moves = 0;
let blocks = [];

function loadBlocks() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('blocks');
    if (raw) blocks = JSON.parse(decodeURIComponent(raw));
  } catch(e) { console.error(e); }

  if (!blocks.length) {
    blocks = [
      {id:'hero',label:'Hero — заголовок и CTA'},
      {id:'proof',label:'Социальное доказательство'},
      {id:'benefits',label:'Преимущества'},
      {id:'howto',label:'Как это работает'},
      {id:'form',label:'Форма заявки'},
      {id:'footer',label:'Footer'},
    ];
  }

  document.getElementById('blockCount').textContent = blocks.length;
  renderBlocks();
  tg.MainButton.show();
}

function renderBlocks() {
  const list = document.getElementById('sortable');
  list.innerHTML = blocks.map((b, i) => {
    const cfg = BLOCK_CFG[b.id] || {emoji:'□', desc:'custom block'};
    return `
    <div class="block-card" data-id="${b.id}">
      <div class="block-idx">${String(i+1).padStart(2,'0')}</div>
      <div class="block-icon">${cfg.emoji}</div>
      <div class="block-info">
        <div class="block-name">${b.label}</div>
        <div class="block-desc">${cfg.desc}</div>
      </div>
      <div class="drag-handle">⠿⠿</div>
    </div>`;
  }).join('');

  Sortable.create(list, {
    animation:180,
    easing:'cubic-bezier(0.22, 1, 0.36, 1)',
    ghostClass:'sortable-ghost',
    dragClass:'sortable-drag',
    handle:'.block-card',
    onEnd() {
      moves++;
      updateUI();
      try { tg.HapticFeedback.impactOccurred('light'); } catch(e){}
    },
  });
}

function updateUI() {
  document.querySelectorAll('.block-idx').forEach((el, i) => {
    el.textContent = String(i+1).padStart(2,'0');
    el.style.transform = 'scale(1.3)';
    el.style.color = '#00fff7';
    setTimeout(() => { el.style.transform=''; el.style.color=''; }, 250);
  });
  document.getElementById('moveCount').textContent = moves;
  document.getElementById('statusVal').textContent = moves > 0 ? 'MODIFIED' : 'READY';
  document.getElementById('statusVal').style.color = moves > 0 ? '#ff0' : '';
}

tg.MainButton.onClick(function() {
  const order = [...document.querySelectorAll('.block-card')].map(c => c.dataset.id);

  const overlay = document.createElement('div');
  overlay.className = 'done-overlay';
  overlay.innerHTML = `
    <div class="done-icon">⚡</div>
    <div class="done-text">Order Applied</div>
    <div class="done-sub">pushing changes to telegram...</div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('statusVal').textContent = 'DEPLOYED';
  document.getElementById('statusVal').style.color = 'var(--neon-green)';

  setTimeout(() => {
    tg.sendData(JSON.stringify({order, moves}));
  }, 400);
});

loadBlocks();
</script>
</body>
</html>
