<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LENDOSIK // BLOCK EDITOR</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --crown-orange: #ff8c00;
  --crown-amber: #ffb347;
  --crown-gold: #ffd700;
  --crown-deep: #e65c00;
  --bg-dark: #0a0a0a;
  --bg-card: rgba(255,140,0,0.04);
  --border-dim: rgba(255,140,0,0.12);
  --border-active: rgba(255,140,0,0.35);
  --text-main: #f0e6d8;
  --text-dim: rgba(240,230,216,0.35);
  --text-muted: rgba(240,230,216,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:var(--bg-dark); }
body {
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  color:var(--text-main);
  overflow-x:hidden;
  position:relative;
}

/* ── CROWN SVG BACKGROUND ── */
.crown-bg {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:420px; height:420px;
  z-index:0;
  pointer-events:none;
  opacity:0.10;
  filter:blur(30px);
  animation:crownPulse 6s ease-in-out infinite;
}
@keyframes crownPulse {
  0%,100% { opacity:0.08; filter:blur(30px); transform:translate(-50%,-50%) scale(1); }
  50%     { opacity:0.14; filter:blur(25px); transform:translate(-50%,-50%) scale(1.04); }
}

/* ── AMBIENT GLOWS ── */
.glow-top {
  position:fixed; top:-180px; left:50%; transform:translateX(-50%);
  width:500px; height:400px;
  background:radial-gradient(circle, rgba(255,140,0,0.12) 0%, rgba(255,140,0,0.04) 40%, transparent 70%);
  pointer-events:none; z-index:0;
}
.glow-bot {
  position:fixed; bottom:-200px; left:50%; transform:translateX(-50%);
  width:600px; height:350px;
  background:radial-gradient(circle, rgba(229,92,0,0.06) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ── GRAIN ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9998; opacity:0.5;
}

.wrapper {
  max-width:440px; margin:0 auto; padding:20px 16px 130px;
  position:relative; z-index:1;
}

/* ── HEADER ── */
.header { text-align:center; margin-bottom:24px; }
.crown-emoji { font-size:2.2rem; margin-bottom:8px; filter:drop-shadow(0 0 18px rgba(255,140,0,0.5)); }
.header h1 {
  font-family:'Dela Gothic One',cursive;
  font-size:1.6rem;
  color:var(--crown-amber);
  letter-spacing:1px;
  text-shadow:0 0 40px rgba(255,140,0,0.3);
  margin-bottom:4px;
}
.header-sub {
  font-family:'Outfit',sans-serif;
  font-size:0.72rem; font-weight:400;
  color:var(--text-dim);
  letter-spacing:1.5px; text-transform:uppercase;
}

/* ── BADGE LINE ── */
.badge-line {
  display:flex; justify-content:center; gap:8px;
  margin-bottom:20px;
}
.badge {
  font-family:'Outfit',sans-serif;
  font-size:0.6rem; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  padding:4px 12px;
  border-radius:20px;
  border:1px solid var(--border-dim);
  color:var(--text-dim);
}
.badge.active {
  background:rgba(255,140,0,0.1);
  border-color:var(--border-active);
  color:var(--crown-amber);
}

/* ── INSTRUCTION ── */
.instruction {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; margin-bottom:18px;
  background:rgba(255,140,0,0.04);
  border:1px solid var(--border-dim);
  border-radius:14px;
  font-size:0.72rem; color:var(--text-dim);
}
.instruction-icon {
  width:32px; height:32px; border-radius:10px; flex-shrink:0;
  background:rgba(255,140,0,0.08);
  border:1px solid rgba(255,140,0,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:0.9rem;
}

/* ── STATS ── */
.stats-row {
  display:flex; gap:8px; margin-bottom:18px;
}
.stat-card {
  flex:1; text-align:center;
  padding:8px 4px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;
}
.stat-label { font-size:0.55rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.stat-val { font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700; color:var(--crown-gold); margin-top:2px; }

/* ── BLOCKS ── */
.blocks-list { display:flex; flex-direction:column; gap:8px; }

.block-card {
  display:flex; align-items:center; gap:12px;
  padding:13px 14px;
  background:var(--bg-card);
  border:1px solid var(--border-dim);
  border-radius:16px;
  cursor:grab; touch-action:none;
  transition:all 0.15s ease;
  user-select:none;
  position:relative;
}
.block-card:hover {
  background:rgba(255,140,0,0.07);
  border-color:var(--border-active);
  box-shadow:0 0 20px rgba(255,140,0,0.05);
}

/* GHOST */
.sortable-ghost {
  opacity:0.15 !important;
  border-color:var(--crown-orange) !important;
  background:rgba(255,140,0,0.05) !important;
  border-radius:16px !important;
}
/* DRAGGING */
.sortable-drag {
  opacity:1 !important;
  background:rgba(15,12,8,0.98) !important;
  border-color:var(--crown-orange) !important;
  border-radius:16px !important;
  box-shadow:
    0 0 40px rgba(255,140,0,0.2),
    0 20px 50px rgba(0,0,0,0.7),
    inset 0 0 40px rgba(255,140,0,0.03) !important;
  transform:scale(1.03) rotate(-0.5deg) !important;
  z-index:9999 !important;
}

/* ── INDEX ── */
.block-idx {
  width:28px; height:28px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Outfit',sans-serif;
  font-size:0.7rem; font-weight:700;
  color:var(--crown-orange);
  border:1px solid rgba(255,140,0,0.25);
  border-radius:8px;
  background:rgba(255,140,0,0.06);
  transition:all 0.2s ease;
}

/* ── ICON ── */
.block-icon {
  width:38px; height:38px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem;
  background:rgba(255,140,0,0.05);
  border:1px solid rgba(255,140,0,0.1);
  border-radius:12px;
}

/* ── TEXT ── */
.block-info { flex:1; min-width:0; }
.block-name {
  font-family:'Outfit',sans-serif;
  font-size:0.82rem; font-weight:700; color:var(--text-main);
  margin-bottom:1px;
}
.block-desc { font-size:0.62rem; color:var(--text-muted); letter-spacing:0.2px; }

/* ── HANDLE ── */
.drag-handle {
  flex-shrink:0; color:rgba(255,140,0,0.15);
  font-size:0.8rem; cursor:grab; transition:color 0.15s;
  letter-spacing:1px;
}
.block-card:hover .drag-handle { color:rgba(255,140,0,0.45); }

/* ── DONE ── */
.done-overlay {
  position:fixed; inset:0;
  background:rgba(10,10,10,0.96);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:99999; animation:fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.done-crown { font-size:3.5rem; margin-bottom:14px; filter:drop-shadow(0 0 30px rgba(255,140,0,0.6)); animation:crownSpin 2s ease-in-out infinite; }
@keyframes crownSpin { 0%,100% { transform:scale(1) rotateY(0deg); } 50% { transform:scale(1.05) rotateY(15deg); } }
.done-text {
  font-family:'Dela Gothic One',cursive;
  font-size:1.2rem; color:var(--crown-gold);
  text-shadow:0 0 30px rgba(255,215,0,0.4);
  letter-spacing:1px; margin-bottom:6px;
}
.done-sub { font-size:0.7rem; color:var(--text-dim); letter-spacing:0.5px; }
</style>
</head>
<body>

<!-- CROWN SVG BACKGROUND -->
<svg class="crown-bg" viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M20 120 L20 60 L55 90 L100 30 L145 90 L180 60 L180 120 Z"
        stroke="#ff8c00" stroke-width="4" fill="none"
        filter="url(#crownGlow)"/>
  <path d="M20 120 L180 120" stroke="#ff8c00" stroke-width="5" stroke-linecap="round"/>
  <circle cx="20" cy="60" r="4" fill="#ffd700"/>
  <circle cx="100" cy="30" r="5" fill="#ffd700"/>
  <circle cx="180" cy="60" r="4" fill="#ffd700"/>
  <circle cx="55" cy="90" r="3" fill="#ffb347"/>
  <circle cx="145" cy="90" r="3" fill="#ffb347"/>
  <defs>
    <filter id="crownGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div class="glow-top"></div>
<div class="glow-bot"></div>

<div class="wrapper">
  <div class="header">
    <div class="crown-emoji">👑</div>
    <h1>LENDOSIK</h1>
    <div class="header-sub">drag · drop · deploy</div>
  </div>

  <div class="badge-line">
    <span class="badge active">🔥 арбитраж</span>
    <span class="badge">💰 лендинги</span>
    <span class="badge">⚡ крео</span>
  </div>

  <div class="instruction">
    <div class="instruction-icon">☝️</div>
    <span>Зажми блок и перетащи вверх или вниз,<br>чтобы изменить структуру лендинга</span>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Блоки</div>
      <div class="stat-val" id="blockCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Мувы</div>
      <div class="stat-val" id="moveCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Статус</div>
      <div class="stat-val" id="statusVal" style="font-size:0.7rem;">READY</div>
    </div>
  </div>

  <div class="blocks-list" id="sortable"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
try {
  tg.setHeaderColor('#0a0a0a');
  tg.setBackgroundColor('#0a0a0a');
} catch(e){}

tg.MainButton.setText('👑 ПРИМЕНИТЬ');
tg.MainButton.color = '#ff8c00';
tg.MainButton.textColor = '#0a0a0a';

const BLOCK_CFG = {
  hero:     { emoji:'⚡', desc:'Заголовок + CTA оффера' },
  proof:    { emoji:'📊', desc:'Цифры и соцдоказательства' },
  benefits: { emoji:'💎', desc:'Преимущества продукта' },
  howto:    { emoji:'🔥', desc:'Шаги конверсии' },
  quiz:     { emoji:'🎯', desc:'Квиз для квалификации' },
  form:     { emoji:'📝', desc:'Лид-форма захвата' },
  footer:   { emoji:'👑', desc:'Подвал + пиксели' },
};

let moves = 0;
let blocks = [];

function loadBlocks() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('blocks');
    if (raw) blocks = JSON.parse(decodeURIComponent(raw));
  } catch(e) { console.error(e); }

  if (!blocks.length) {
    blocks = [
      {id:'hero',label:'Hero — заголовок и CTA'},
      {id:'proof',label:'Социальное доказательство'},
      {id:'benefits',label:'Преимущества'},
      {id:'howto',label:'Как это работает'},
      {id:'form',label:'Форма заявки'},
      {id:'footer',label:'Footer'},
    ];
  }

  document.getElementById('blockCount').textContent = blocks.length;
  renderBlocks();
  tg.MainButton.show();
}

function renderBlocks() {
  const list = document.getElementById('sortable');
  list.innerHTML = blocks.map((b, i) => {
    const cfg = BLOCK_CFG[b.id] || {emoji:'📦', desc:'custom'};
    return `
    <div class="block-card" data-id="${b.id}">
      <div class="block-idx">${String(i+1).padStart(2,'0')}</div>
      <div class="block-icon">${cfg.emoji}</div>
      <div class="block-info">
        <div class="block-name">${b.label}</div>
        <div class="block-desc">${cfg.desc}</div>
      </div>
      <div class="drag-handle">⠿⠿</div>
    </div>`;
  }).join('');

  Sortable.create(list, {
    animation:200,
    easing:'cubic-bezier(0.22, 1, 0.36, 1)',
    ghostClass:'sortable-ghost',
    dragClass:'sortable-drag',
    handle:'.block-card',
    onEnd() {
      moves++;
      updateUI();
      try { tg.HapticFeedback.impactOccurred('light'); } catch(e){}
    },
  });
}

function updateUI() {
  document.querySelectorAll('.block-idx').forEach((el, i) => {
    el.textContent = String(i+1).padStart(2,'0');
    el.style.transform = 'scale(1.3)';
    el.style.color = 'var(--crown-gold)';
    setTimeout(() => { el.style.transform=''; el.style.color=''; }, 300);
  });
  document.getElementById('moveCount').textContent = moves;
  const sv = document.getElementById('statusVal');
  sv.textContent = moves > 0 ? 'MODIFIED' : 'READY';
  sv.style.color = moves > 0 ? 'var(--crown-amber)' : '';
}

tg.MainButton.onClick(function() {
  const order = [...document.querySelectorAll('.block-card')].map(c => c.dataset.id);

  const overlay = document.createElement('div');
  overlay.className = 'done-overlay';
  overlay.innerHTML = `
    <div class="done-crown">👑</div>
    <div class="done-text">DEPLOYED</div>
    <div class="done-sub">отправляем новый лендинг в Telegram...</div>
  `;
  document.body.appendChild(overlay);

  setTimeout(() => {
    tg.sendData(JSON.stringify({order, moves}));
  }, 500);
});

loadBlocks();
</script>
</body>
</html>
